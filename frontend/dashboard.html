<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Admin Panel</span>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Post New Job</h5>
                        <form id="addJobForm">
                            <input type="text" id="jobTitle" class="form-control mb-2" placeholder="Title" required>
                            <input type="text" id="jobCompany" class="form-control mb-2" placeholder="Company" required>
                            <input type="text" id="jobLoc" class="form-control mb-2" placeholder="Location" required>
                            <input type="text" id="jobSal" class="form-control mb-2" placeholder="Salary" required>
                            <textarea id="jobDesc" class="form-control mb-2" placeholder="Description"></textarea>
                            <button class="btn btn-success w-100">Add Job</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <h3>Current Job Openings</h3>
                <div id="adminJobList" class="list-group"></div>

                <h3 class="mt-5">Applications Received</h3>
                <div class="table-responsive mt-3">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Applicant</th>
                                <th>Job</th>
                                <th>Resume</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="appTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/jobs.js"></script>
    <script>
        // Check if admin
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') window.location.href = 'login.html';
        
        window.onload = () => {
            fetchAdminJobs();
            fetchAdminApplications();
        };
    </script>
</body>
</html>
