<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Job | JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h3>Submit Application</h3>
                        <p class="text-muted" id="jobInfo"></p>
                        <form id="applyForm">
                            <div class="mb-3">
                                <label class="form-label">Resume Link (Google Drive / Dropbox)</label>
                                <input type="url" id="resumeLink" class="form-control" placeholder="https://..." required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Submit Application</button>
                            <a href="jobs.html" class="btn btn-link w-100">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/apply.js"></script>
</body>
</html>
