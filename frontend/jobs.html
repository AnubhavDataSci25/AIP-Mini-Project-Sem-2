<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs | JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">JobPortal</a>
            <div class="ms-auto" id="nav-user">
                <a href="login.html" class="btn btn-light">Login</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="searchBar" class="form-control" placeholder="Search by job title or company...">
            </div>
        </div>
        <div id="jobListing" class="row">
            <!-- Jobs will be injected here -->
        </div>
        
        <h3 class="mt-5">My Applications</h3>
        <div id="myApps" class="row"></div>
    </div>

    <script src="js/jobs.js"></script>
    <script>
        const userData = JSON.parse(localStorage.getItem('user'));
        if (userData) {
            document.getElementById('nav-user').innerHTML = `
                <span class="text-white me-2">Hello, ${userData.name}</span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            `;
            fetchUserApplications();
        }
        fetchAllJobs();
    </script>
</body>
</html>
